services:
  app:
    container_name: kx-backend
    build: .
    ports:
      - "8080:8080"
    restart: no
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080

      DEV_DB_URL: ${DEV_DB_URL}
      DEV_DB_USERNAME: ${DEV_DB_USERNAME}
      DEV_DB_PASSWORD: ${DEV_DB_PASSWORD}

      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}